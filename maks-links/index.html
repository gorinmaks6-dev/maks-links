<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Maks Gorin — Links</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="icon" href="assets/janus-logo-icon.png" type="image/png">
<style>
  :root{
    --dock-bg: rgba(255,255,255,0.14);
    --dock-border: rgba(255,255,255,0.28);
    --text: #f5f5f7;
    --muted: rgba(245,245,247,0.72);
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html,body{
    margin:0; padding:0;
    height:100%;
    font-family:-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
    color: var(--text);
    overflow-x:hidden;
  }
  .desktop{
    position:relative;
    min-height:100vh;
    min-height:100dvh;
    background: url('assets/bg.jpg') center 62% / cover no-repeat;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
  }
  .desktop::before{
    content:'';
    position:absolute; inset:0;
    background:
      linear-gradient(180deg, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.05) 16%, rgba(0,0,0,0.15) 55%, rgba(0,0,0,0.72) 100%);
    pointer-events:none;
  }

  /* --- macOS menu bar --- */
  .menubar{
    position:relative;
    z-index:2;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 10px 18px;
    padding-top: max(10px, env(safe-area-inset-top));
    background: rgba(20,20,22,0.35);
    backdrop-filter: blur(18px) saturate(160%);
    -webkit-backdrop-filter: blur(18px) saturate(160%);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    font-size: 13px;
    font-weight: 500;
  }
  .menubar .left{ display:flex; align-items:center; gap:14px; }
  .menubar .appname{ font-weight:600; letter-spacing:0.01em; }
  .menubar .right{ display:flex; align-items:center; gap:12px; opacity:0.9; }
  .menubar .right svg.battery-icon{ height:13px; width:auto; display:block; }
  .menubar-logo{
    height: 15px;
    width: auto;
    display: block;
    object-fit: contain;
  }
  .clock{ font-variant-numeric: tabular-nums; }

  /* --- centered identity --- */
  .identity{
    position:relative;
    z-index:2;
    text-align:center;
    padding: 0 20px;
    margin-top: 14vh;
  }
  .identity h1{
    margin:0;
    font-size: clamp(30px, 8vw, 44px);
    font-weight: 700;
    letter-spacing: -0.01em;
    text-shadow: 0 2px 24px rgba(0,0,0,0.4);
  }
  .identity p{
    margin: 8px 0 0;
    font-size: 14px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.02em;
  }

  /* --- dock --- */
  .dock-wrap{
    position:relative;
    z-index:2;
    display:flex;
    justify-content:center;
    padding: 0 16px max(22px, env(safe-area-inset-bottom));
  }
  .dock{
    display:flex;
    align-items:flex-end;
    gap: 20px;
    padding: 14px 20px;
    background: var(--dock-bg);
    border: 1px solid var(--dock-border);
    border-radius: 26px;
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    box-shadow: 0 12px 40px rgba(0,0,0,0.35);
  }
  .app{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:7px;
    text-decoration:none;
    color:var(--text);
    background:none;
    border:none;
    cursor:pointer;
    -webkit-user-select:none;
    user-select:none;
  }
  .icon{
    width: 62px;
    height: 62px;
    border-radius: 16px;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    transition: transform 0.18s cubic-bezier(.2,1.4,.4,1), box-shadow 0.18s ease;
    box-shadow: 0 6px 14px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.15);
    position:relative;
  }
  .icon::after{
    content:'';
    position:absolute; inset:0;
    background: linear-gradient(180deg, rgba(255,255,255,0.25), rgba(255,255,255,0) 45%);
    pointer-events:none;
  }
  .app:hover .icon, .app:focus-visible .icon{
    transform: translateY(-10px) scale(1.08);
    box-shadow: 0 16px 26px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.2);
  }
  .app:active .icon{ transform: translateY(-4px) scale(1.02); }

  .icon.janus{
    background: rgba(255,255,255,0.22);
    backdrop-filter: blur(22px) saturate(190%);
    -webkit-backdrop-filter: blur(22px) saturate(190%);
    border: 1px solid rgba(255,255,255,0.38);
    box-shadow:
      0 6px 14px rgba(0,0,0,0.28),
      inset 0 1px 0 rgba(255,255,255,0.55),
      inset 0 -1px 0 rgba(255,255,255,0.12);
  }
  .icon.janus img{ width:88%; height:88%; object-fit:contain; object-position:center; }

  .icon.youtube{ background: linear-gradient(180deg, #ff2f2f, #d40f0f); }
  .icon.youtube i{ font-size: 26px; color:#fff; margin-left:2px; }

  .icon.tiktok{ background: #0a0a0a; }
  .icon.tiktok i{ font-size: 26px; background: linear-gradient(135deg, #25f4ee, #fe2c55); -webkit-background-clip:text; background-clip:text; color:transparent; }

  .label{
    font-size: 11.5px;
    font-weight: 500;
    color: var(--muted);
    text-shadow: 0 1px 6px rgba(0,0,0,0.5);
    white-space:nowrap;
  }

  .toast{
    position: fixed;
    left: 50%;
    bottom: 128px;
    transform: translate(-50%, 12px);
    background: rgba(30,30,32,0.85);
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--text);
    padding: 11px 16px;
    border-radius: 10px;
    font-size: 12.5px;
    max-width: 88%;
    text-align:center;
    opacity: 0;
    pointer-events:none;
    transition: opacity 0.25s ease, transform 0.25s ease;
    backdrop-filter: blur(12px);
    z-index: 5;
  }
  .toast.show{ opacity: 1; transform: translate(-50%, 0); }

  @media (prefers-reduced-motion: reduce){ *{ transition:none !important; } }
</style>
</head>
<body>

<div class="desktop">

  <div class="menubar">
    <div class="left">
      <span class="appname">Maks Gorin</span>
    </div>
    <div class="right">
      <img class="menubar-logo" src="assets/mg-monogram.png" width="11" height="15" alt="">
      <svg class="battery-icon" viewBox="0 0 28 14" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="1" y="1.5" width="22" height="11" rx="2.5" stroke="white" stroke-width="1.3"/><rect x="3" y="3.5" width="14" height="7" rx="1" fill="white"/><rect x="24.5" y="4.5" width="2" height="5" rx="1" fill="white"/></svg>
      <span class="clock" id="clock">--:--</span>
    </div>
  </div>

  <div class="identity">
    <h1>Maks Gorin</h1>
    <p>Montréal</p>
  </div>

  <div class="dock-wrap">
    <div class="dock">

      <a class="app" href="https://januslabsco.com" data-web="https://januslabsco.com">
        <span class="icon janus"><img src="assets/janus-logo-icon.png" alt="Janus Labs Co."></span>
        <span class="label">Studio</span>
      </a>

      <a class="app"
         href="https://www.youtube.com/@maksgorin2687"
         data-web="https://www.youtube.com/@maksgorin2687"
         data-ios="youtube://www.youtube.com/@maksgorin2687"
         data-android-package="com.google.android.youtube">
        <span class="icon youtube"><i class="fa-solid fa-play"></i></span>
        <span class="label">YouTube</span>
      </a>

      <a class="app"
         href="https://www.tiktok.com/@maksgorin1"
         data-web="https://www.tiktok.com/@maksgorin1"
         data-android-package="com.zhiliaoapp.musically">
        <span class="icon tiktok"><i class="fa-brands fa-tiktok"></i></span>
        <span class="label">TikTok</span>
      </a>

    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  var clockEl = document.getElementById('clock');
  var tz = 'America/Toronto';

  function updateClock(){
    if (!clockEl) return;
    var parts = new Intl.DateTimeFormat('en-US', {
      timeZone: tz,
      hour: 'numeric',
      minute: '2-digit',
      hour12: true
    }).formatToParts(new Date());
    var hour = '';
    var minute = '';
    var dayPeriod = '';
    parts.forEach(function(part){
      if (part.type === 'hour') hour = part.value;
      if (part.type === 'minute') minute = part.value;
      if (part.type === 'dayPeriod') dayPeriod = part.value;
    });
    clockEl.textContent = hour + ':' + minute + ' ' + dayPeriod;
  }

  updateClock();
  var msToNextMinute = 60000 - (Date.now() % 60000);
  setTimeout(function(){
    updateClock();
    setInterval(updateClock, 60000);
  }, msToNextMinute);

  var isAndroid = /android/i.test(navigator.userAgent);
  var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  var toast = document.getElementById('toast');
  var toastTimer;

  function showToast(msg){
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ toast.classList.remove('show'); }, 3200);
  }

  document.querySelectorAll('.app').forEach(function(row){
    row.addEventListener('click', function(e){
      var webUrl = row.getAttribute('data-web');
      var iosScheme = row.getAttribute('data-ios');
      var androidPkg = row.getAttribute('data-android-package');

      if (!iosScheme && !androidPkg){ return; } // plain link, let it navigate normally

      e.preventDefault();

      if (isAndroid && androidPkg){
        var bare = webUrl.replace(/^https?:\/\//, '');
        var intentUrl = 'intent://' + bare +
          '#Intent;scheme=https;package=' + androidPkg +
          ';S.browser_fallback_url=' + encodeURIComponent(webUrl) + ';end';
        window.location.href = intentUrl;
        return;
      }

      if (isIOS && iosScheme){
        var didHide = false;
        var onHide = function(){ didHide = true; };
        document.addEventListener('visibilitychange', onHide, { once: true });
        window.location.href = iosScheme;
        setTimeout(function(){
          document.removeEventListener('visibilitychange', onHide);
          if (!didHide){
            showToast("Couldn't open the app — continuing in browser.");
            window.location.href = webUrl;
          }
        }, 900);
        return;
      }

      window.location.href = webUrl;
    });
  });
})();
</script>

</body>
</html>
